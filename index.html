    <script>
      const baseUrl = "https://hayustudio.com";
      const phoneNumber = "62812xxxxxxxx";

      const categoryUrl = baseUrl + "/seller/api/v1/categories";
      let nextPageUrl = baseUrl + "/seller/api/v1/products/websites?limit=12"; // halaman awal
      let isLoading = false;
      let currentCategoryId = null;
      const defaultCategoryName = "Wedding";

      async function loadThemes(reset = false) {
        isLoading = true;

        const container = document.getElementById("themes");
        const btn = document.getElementById("loadMore");
        btn.textContent = "Loading...";

if (reset) {
  container.innerHTML = "";
  nextPageUrl = `${baseUrl}/seller/api/v1/products/websites?limit=12`;

  if (currentCategoryId) {
    nextPageUrl += `&categoryId=${currentCategoryId}`;
  }

  // penting: tampilkan lagi tombol saat pindah kategori
  btn.style.display = "inline-flex";
}

        if (!nextPageUrl) {
          isLoading = false;
          btn.style.display = "none";
          return;
        }

        try {
          const response = await fetch(nextPageUrl);
          if (!response.ok) throw new Error("Gagal mengambil data");

          const result = await response.json();
          const themes = result.data?.data || [];

          // Simpan URL untuk halaman berikutnya
          nextPageUrl = result.data?.next_page_url || null;
          if (nextPageUrl) nextPageUrl = nextPageUrl.replace("http:", "https:");

          // Render setiap tema
          themes.forEach((theme) => {
            const card = document.createElement("div");
            card.innerHTML = `
              <div class="bg-card rounded shadow-lg hover:shadow-2xl transition duration-300">
                <div class="aspect-square rounded overflow-hidden">
                  <img src="${theme.featured_image}" class="size-full object-cover" />
                </div>
                <div class="p-2 sm:p-4">
                  <h3 class="font-bold leading-tight mb-3">${theme.name}</h3>
                  <div class="grid gap-2 sm:grid-cols-1">
                    <a
                      href="${baseUrl}/preview/${theme.slug}"
                      target="_blank"
                      rel="nofollow"
                      class="btn text-sm sm:text-base inline-flex items-center text-center justify-center rounded h-8 px-2 bg-secondary text-black hover:bg-secondary"
                    >
                      Preview
                    </a>
                  </div>
                </div>
              </div>
            `;
            container.appendChild(card);
          });

          // Jika sudah tidak ada halaman berikutnya
          if (!nextPageUrl) {
            btn.style.display = "none";
          }
        } catch (error) {
          console.error(error);
          alert("Terjadi kesalahan saat memuat data.");
        } finally {
          isLoading = false;
          reset = false;
          btn.textContent = "Load More Themes";
        }
      }

      // Event listener tombol
      document
        .getElementById("loadMore")
        .addEventListener("click", () => loadThemes());

      // Fetch categories
      async function loadCategories() {
  const categoriesContainer = document.getElementById("categories");

  try {
    const response = await fetch(categoryUrl);
    if (!response.ok) throw new Error("Gagal mengambil data kategori");

    const result = await response.json();
    const categories = result.data || [];

    // tombol ALL (menampilkan semua tema)
const allButton = document.createElement("button");

allButton.className =
  "btn text-sm sm:text-base inline-flex items-center text-center justify-center rounded h-8 px-2 bg-secondary hover:bg-secondary m-1 hover:cursor-pointer";

allButton.textContent = "All";

allButton.addEventListener("click", () => {
  currentCategoryId = null; // null = semua kategori
  isLoading = false;
  loadThemes(true);
});

categoriesContainer.appendChild(allButton);

    categories.forEach((category) => {
      const buttonCategory = document.createElement("button");

      buttonCategory.className =
        "btn text-sm sm:text-base inline-flex items-center text-center justify-center rounded h-8 px-2 bg-secondary hover:bg-secondary m-1 hover:cursor-pointer";

      buttonCategory.textContent = category.name;

      // otomatis pilih Wedding saat pertama kali load
      if (
        category.name.trim().toLowerCase() ===
        defaultCategoryName.toLowerCase()
      ) {
        currentCategoryId = category.id;
      }

      // saat tombol kategori diklik
      buttonCategory.addEventListener("click", () => {
        currentCategoryId = category.id;
        isLoading = false;
        loadThemes(true);
      });

      categoriesContainer.appendChild(buttonCategory);
    });

    // setelah kategori selesai dibuat, langsung load tema Wedding
    if (currentCategoryId) {
      loadThemes(true);
    }

  } catch (error) {
    console.error(error);
    alert("Terjadi kesalahan saat memuat kategori.");
  }
}
      // Load pertama kali
loadCategories();
    </script>
    <script>
document.addEventListener("DOMContentLoaded", function () {
    const hideButton = setInterval(() => {

        buttons.forEach(button => {
            if (button.textContent.trim() === "Undangan Syukuran") {
                button.style.display = "none";
            }

});
